#ansible-playbook update_pve.yml -K

---
- name: Proxmox VE ホストのアップデートとアップグレード
  hosts: proxmox
  gather_facts: false
  
  vars:
    vault_addr: "{{ lookup('env', 'VAULT_ADDR') }}"
    v_token: "{{ lookup('env', 'VAULT_TOKEN') }}"
    CF_ACCESS_CLIENT_ID: "{{ lookup('env', 'TUNNEL_SERVICE_TOKEN_ID') }}"
    CF_ACCESS_CLIENT_SECRET: "{{ lookup('env', 'TUNNEL_SERVICE_TOKEN_SECRET') }}"
    
  tasks:
    - name: Vaultから認証情報を取得 (公式uriモジュール)
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/ad/creds/ldapci-role"
        #cloudflareがurllibをブロックするため対策（cloudflare側で許可する方法は分からず・・・）
        http_agent: "curl/8.5.0"
        headers:
          X-Vault-Token: "{{ v_token }}"
          CF-Access-Client-Id: "{{ lookup('env', 'TUNNEL_SERVICE_TOKEN_ID') }}"
          CF-Access-Client-Secret: "{{ lookup('env', 'TUNNEL_SERVICE_TOKEN_SECRET') }}"
        timeout: 120
      register: vault_response
      delegate_to: localhost
      #no_log: true
      run_once: true

    #- name: 変数の全中身をそのまま表示
    #  ansible.builtin.debug:
    #    var: vault_response
    #  run_once: true

    - name: SSHパスワードとsudoパスワードをset
      ansible.builtin.set_fact:
        ansible_password: "{{ vault_response.json.data.current_password }}"
        ansible_become_password: "{{ vault_response.json.data.current_password }}"
      no_log: true

    - name: aptキャッシュの更新と dist-upgrade の実行
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
        # 不要になった依存パッケージを自動削除する (apt autoremove に相当)
        autoremove: yes
        # キャッシュの有効期限を秒で指定（1時間以内に実行されていればupdateをスキップ）
        cache_valid_time: 3600
      become: true

    - name: 再起動が必要かどうかを確認する
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: 再起動が必要なホストを通知する
      ansible.builtin.debug:
        msg: "このホストはカーネル等の更新が完了したため、再起動が必要です。"
      when: reboot_required_file.stat.exists
