---
- name: Debian 13 Update and Check Reboot
  hosts: debian_servers
  become: true
  vars:
    ansible_become_password: "{{ (lookup('community.hashi_vault.hashi_vault', 'ad/creds/ldapci-role'))['current_password'] }}"
  tasks:
    - name: apt update と apt upgrade を実行
      ansible.builtin.apt:
        update_cache: yes
        upgrade: yes       
        autoremove: yes 

    - name: 再起動が必要か確認 (/var/run/reboot-required の存在確認)
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: 再起動が必要な場合に通知
      ansible.builtin.debug:
        msg: "再起動が必要です。"
      when: reboot_required_file.stat.exists